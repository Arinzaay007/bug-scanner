<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BugScan — Web Vulnerability Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0e;
      --surface: #0a1520;
      --border: #0d2535;
      --accent: #00e5ff;
      --accent2: #ff3860;
      --accent3: #00ff9d;
      --warn: #ffb300;
      --text: #c9d8e3;
      --dim: #4a6070;
      --critical: #ff3860;
      --high: #ff9100;
      --medium: #ffb300;
      --low: #00e5ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      padding: 40px 0 30px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(0,229,255,0.25), inset 0 0 16px rgba(0,229,255,0.05);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(0,229,255,0.25), inset 0 0 16px rgba(0,229,255,0.05); }
      50% { box-shadow: 0 0 28px rgba(0,229,255,0.45), inset 0 0 16px rgba(0,229,255,0.1); }
    }

    .logo-icon svg { width: 22px; height: 22px; }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* Scanner card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .card-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '//';
      color: var(--dim);
    }

    /* Input group */
    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,229,255,0.15);
    }

    input::placeholder { color: var(--dim); }

    /* Checkboxes */
    .checks-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text);
      transition: color 0.2s;
    }

    .check-item:hover { color: var(--accent); }

    .check-item input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--dim);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .check-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -1px; left: 1px;
      font-size: 12px;
      color: #000;
      font-weight: bold;
    }

    /* Scan button */
    .scan-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .scan-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 24px rgba(0,229,255,0.3);
    }

    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .scan-btn.scanning::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.15), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      to { left: 100%; }
    }

    /* Terminal log */
    #terminal {
      background: #020608;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.8;
      min-height: 200px;
      max-height: 380px;
      overflow-y: auto;
      display: none;
      margin-bottom: 24px;
    }

    #terminal.active { display: block; }

    .log-line { margin: 0; }
    .log-info  { color: var(--accent); }
    .log-ok    { color: var(--accent3); }
    .log-warn  { color: var(--warn); }
    .log-error { color: var(--accent2); }
    .log-dim   { color: var(--dim); }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent);
      animation: blink 0.9s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Progress bar */
    .progress-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 24px;
      display: none;
      overflow: hidden;
    }

    .progress-wrap.active { display: block; }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 99px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--accent);
    }

    /* Results */
    #results { display: none; }
    #results.active { display: block; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }

    .stat-box .num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      font-weight: bold;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-box .lbl {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
    }

    .stat-box.critical .num { color: var(--critical); }
    .stat-box.high .num    { color: var(--high); }
    .stat-box.safe .num    { color: var(--accent3); }
    .stat-box.pages .num   { color: var(--accent); }

    /* Findings table */
    .findings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .findings-table th {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .findings-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(13,37,53,0.5);
      font-size: 0.85rem;
      vertical-align: top;
      word-break: break-all;
    }

    .findings-table tr:hover td { background: rgba(0,229,255,0.03); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
    }

    .badge-critical { background: rgba(255,56,96,0.15); color: var(--critical); border: 1px solid rgba(255,56,96,0.3); }
    .badge-high     { background: rgba(255,145,0,0.15); color: var(--high);     border: 1px solid rgba(255,145,0,0.3); }
    .badge-medium   { background: rgba(255,179,0,0.15); color: var(--medium);   border: 1px solid rgba(255,179,0,0.3); }
    .badge-info     { background: rgba(0,229,255,0.1);  color: var(--accent);   border: 1px solid rgba(0,229,255,0.2); }

    .type-xss  { color: #ff9100; }
    .type-sqli { color: var(--critical); }
    .type-ssrf { color: #d946ef; }
    .type-login{ color: var(--warn); }

    code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent3);
      background: rgba(0,255,157,0.05);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .no-findings {
      text-align: center;
      padding: 40px;
      color: var(--accent3);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    /* Download btn */
    .dl-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
    }

    .dl-btn:hover {
      background: var(--accent3);
      color: #000;
    }

    /* Error */
    .error-box {
      background: rgba(255,56,96,0.08);
      border: 1px solid rgba(255,56,96,0.3);
      border-radius: 6px;
      padding: 16px;
      color: var(--critical);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      display: none;
      margin-bottom: 20px;
    }

    .error-box.active { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    footer {
      padding: 30px 0;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 2px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div>
        <h1>BUG<span>SCAN</span></h1>
        <div class="tagline">// WEB VULNERABILITY SCANNER v2.0</div>
      </div>
    </div>
  </header>

  <!-- Scanner config -->
  <div class="card">
    <div class="card-title">Target Configuration</div>

    <div class="input-row">
      <div class="input-group" style="flex:2">
        <label>Target URL</label>
        <input type="text" id="target" placeholder="https://example.com" />
      </div>
      <div class="input-group" style="flex:0.5; min-width:120px">
        <label>Max Pages</label>
        <input type="number" id="maxPages" value="5" min="1" max="20" />
      </div>
    </div>

    <div class="card-title" style="margin-top:8px">Scan Modules</div>
    <div class="checks-row">
      <label class="check-item">
        <input type="checkbox" id="chk-xss" checked /> XSS
      </label>
      <label class="check-item">
        <input type="checkbox" id="chk-sqli" checked /> SQL Injection
      </label>
      <label class="check-item">
        <input type="checkbox" id="chk-login" checked /> Login Bypass
      </label>
      <label class="check-item">
        <input type="checkbox" id="chk-ssrf" checked /> SSRF
      </label>
      <label class="check-item">
        <input type="checkbox" id="chk-headers" checked /> Security Headers
      </label>
    </div>

    <div id="error-box" class="error-box"></div>

    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      ▶ &nbsp; INITIATE SCAN
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- Terminal -->
  <div id="terminal"></div>

  <!-- Results -->
  <div id="results">
    <div class="card">
      <div class="card-title">Scan Summary</div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="card" id="findingsCard">
      <div class="card-title">Findings</div>
      <div id="findingsContainer"></div>
      <button class="dl-btn" onclick="downloadReport()">↓ Download Report</button>
    </div>
  </div>

  <footer>BUGSCAN v2.0 &nbsp;·&nbsp; FOR AUTHORIZED TESTING ONLY &nbsp;·&nbsp; USE RESPONSIBLY</footer>
</div>

<script>
  let scanResults = null;

  function log(msg, type = 'info') {
    const el = document.getElementById('terminal');
    const line = document.createElement('p');
    line.className = `log-line log-${type}`;
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function setProgress(pct) {
    document.getElementById('progressBar').style.width = pct + '%';
  }

  async function startScan() {
    const target = document.getElementById('target').value.trim();
    const maxPages = parseInt(document.getElementById('maxPages').value) || 5;
    const modules = {
      xss:     document.getElementById('chk-xss').checked,
      sqli:    document.getElementById('chk-sqli').checked,
      login:   document.getElementById('chk-login').checked,
      ssrf:    document.getElementById('chk-ssrf').checked,
      headers: document.getElementById('chk-headers').checked,
    };

    const errBox = document.getElementById('error-box');
    errBox.classList.remove('active');

    if (!target) {
      errBox.textContent = '[!] Please enter a target URL.';
      errBox.classList.add('active');
      return;
    }
    if (!target.startsWith('http://') && !target.startsWith('https://')) {
      errBox.textContent = '[!] URL must start with http:// or https://';
      errBox.classList.add('active');
      return;
    }

    // Reset UI
    const term = document.getElementById('terminal');
    term.innerHTML = '';
    term.classList.add('active');
    document.getElementById('progressWrap').classList.add('active');
    document.getElementById('results').classList.remove('active');
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.classList.add('scanning');
    btn.textContent = '⠋ SCANNING...';

    setProgress(5);
    log(`[*] Initializing scan on: ${target}`, 'info');
    log(`[*] Max pages: ${maxPages}`, 'dim');
    log(`[*] Modules: ${Object.entries(modules).filter(([,v])=>v).map(([k])=>k.toUpperCase()).join(', ')}`, 'dim');
    log('', 'dim');

    try {
      setProgress(15);
      log('[*] Crawling target for forms and links...', 'info');

      const res = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target, max_pages: maxPages, modules })
      });

      setProgress(60);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Server error' }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      scanResults = data;

      setProgress(90);

      // Log results
      log(`[+] Crawled ${data.pages_crawled} page(s), found ${data.forms_found} form(s)`, 'ok');
      log('', 'dim');

      if (data.log && data.log.length) {
        for (const entry of data.log) {
          const type = entry.startsWith('[!!]') ? 'error'
                     : entry.startsWith('[ok]') ? 'ok'
                     : entry.startsWith('[!]')  ? 'warn'
                     : entry.startsWith('[+]')  ? 'ok'
                     : 'info';
          log('  ' + entry, type);
        }
      }

      log('', 'dim');
      log(`[+] Scan complete. ${data.findings.length} finding(s) detected.`, data.findings.length > 0 ? 'error' : 'ok');

      setProgress(100);
      renderResults(data);

    } catch (err) {
      log(`[!!] ERROR: ${err.message}`, 'error');
      errBox.textContent = '[!!] Scan failed: ' + err.message;
      errBox.classList.add('active');
    }

    btn.disabled = false;
    btn.classList.remove('scanning');
    btn.textContent = '▶   INITIATE SCAN';
  }

  function renderResults(data) {
    const findings = data.findings;
    const critical = findings.filter(f => f.severity === 'Critical').length;
    const high     = findings.filter(f => f.severity === 'High').length;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-box pages"><div class="num">${data.pages_crawled}</div><div class="lbl">Pages Crawled</div></div>
      <div class="stat-box pages"><div class="num" style="color:var(--text)">${data.forms_found}</div><div class="lbl">Forms Found</div></div>
      <div class="stat-box critical"><div class="num">${critical}</div><div class="lbl">Critical</div></div>
      <div class="stat-box high"><div class="num">${high}</div><div class="lbl">High</div></div>
      <div class="stat-box safe"><div class="num">${findings.length}</div><div class="lbl">Total Findings</div></div>
    `;

    const fc = document.getElementById('findingsContainer');
    if (!findings.length) {
      fc.innerHTML = '<div class="no-findings">✓ No vulnerabilities detected</div>';
    } else {
      const rows = findings.map(f => `
        <tr>
          <td><span class="type-${f.type.toLowerCase().replace(' ','-')}">${f.type}</span></td>
          <td><span class="badge badge-${f.severity.toLowerCase()}">${f.severity}</span></td>
          <td style="font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--dim)">${f.url}</td>
          <td><code>${escHtml(f.payload || f.detail || '')}</code></td>
        </tr>
      `).join('');
      fc.innerHTML = `
        <table class="findings-table">
          <thead><tr><th>Type</th><th>Severity</th><th>URL</th><th>Detail</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    document.getElementById('results').classList.add('active');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function downloadReport() {
    if (!scanResults) return;
    const d = scanResults;
    const rows = d.findings.map(f => `
      <tr>
        <td style="color:#ff9100;font-weight:bold">${f.type}</td>
        <td><span style="background:${f.severity==='Critical'?'#ff3860':'#ff9100'};color:white;padding:2px 8px;border-radius:4px;font-size:12px">${f.severity}</span></td>
        <td>${f.url}</td>
        <td><code style="background:#111;padding:3px 6px;border-radius:3px;font-size:12px">${escHtml(f.payload||f.detail||'')}</code></td>
      </tr>`).join('');

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BugScan Report</title>
    <style>body{font-family:Arial,sans-serif;background:#0d0d0d;color:#eee;padding:30px}
    h1{color:#00e5ff}h3{color:#aaa}table{width:100%;border-collapse:collapse;margin-top:20px}
    th{background:#1a1a2e;color:#00e5ff;padding:12px;text-align:left}
    td{padding:10px;border-bottom:1px solid #333}tr:hover{background:#1a1a1a}
    .summary{background:#1a1a2e;padding:15px;border-radius:8px;margin-bottom:20px}
    .none{color:#00ff9d;font-size:1.2rem}</style></head>
    <body><h1>BugScan Report</h1>
    <div class="summary">
      <h3>Target: ${d.target}</h3>
      <h3>Scan Date: ${d.timestamp}</h3>
      <h3>Pages Crawled: ${d.pages_crawled}</h3>
      <h3>Total Findings: ${d.findings.length}</h3>
    </div>
    ${d.findings.length
      ? `<table><tr><th>Type</th><th>Severity</th><th>URL</th><th>Detail</th></tr>${rows}</table>`
      : `<p class="none">✓ No vulnerabilities found.</p>`}
    </body></html>`;

    const blob = new Blob([html], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bugscan-report.html';
    a.click();
  }
</script>
</body>
</html>
